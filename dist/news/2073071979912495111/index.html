<meta property="og:description" content="在人工智能探索科学前沿的征途中，又迎来了一个里程碑时刻。7月3日，阿里达摩院联合中国人民大学、中国科学院大学等机构，正式发布了全球首个专门用于超导材料发现的 AI 智能体——Elements Claw。这一成果不仅标志着 AI 在科学发现领域从“辅助角色”向“独立攻关”的跨越，也为新材料研发提供了一种高效的自动化范式。" />
