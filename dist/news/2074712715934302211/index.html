<meta property="og:description" content="与市面上常见的“聊天+搜索”类桌面工具不同，Rowboat 的核心逻辑在于建立长期的上下文记忆。它不仅是一个简单的交互窗口，更像是一个能够自我学习的数字助理。通过将用户的邮件、会议记录以及 Slack 等协作工具中的碎片化数据进行深度索引，Rowboat 构建出了一套类似 Obsidian 风格的知识图谱。这种设计让 AI 能够真正理解你的工作逻辑，提供更具针对性的支持。" />
