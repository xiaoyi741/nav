<meta property="og:description" content="在浏览器自动化开发的漫长道路上，开发者们似乎总在重复“造轮子”。无论是通过复杂的屏幕截图去“看”网页，还是依赖底层协议去“强行驱动”，往往由于网页结构的动态变化而显得力不从心。近日，阿里巴巴开源了一款名为 Page Agent 的 JavaScript 客户端库，为这一行业难题提供了一种全新的破局思路:它不再试图从外部暴力破解网页，而是让大模型直接“读懂”网页内部的 DOM 结构。" />
