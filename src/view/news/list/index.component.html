<div class="news-page">
  <header class="news-header dark-bg">
    <h1 class="news-title dark-white">AI 资讯</h1>
    <p class="news-subtitle dark-text">精选 AI 行业最新动态</p>
    <div class="news-search">
      <input nz-input [(ngModel)]="searchKeyword" (ngModelChange)="onSearch()" placeholder="搜索资讯..." class="search-input dark-bg dark-border-color dark-text" />
    </div>
  </header>

  <div class="news-list">
    <div class="news-card dark-bg dark-border-color" *ngFor="let item of filteredNews" (click)="goToDetail(item.id)">
      <h3 class="news-title-text ellipsis dark-white">{{ item.title }}</h3>
      <p class="news-desc ellipsis2 dark-text">{{ item.description }}</p>
      <div class="news-meta dark-text">
        <span *ngIf="item.author">{{ item.author }}</span>
        <span *ngIf="item.createdAt">{{ item.createdAt }}</span>
        <span *ngIf="item.readCount">{{ item.readCount }} 阅读</span>
      </div>
    </div>

    <app-no-data *ngIf="filteredNews.length === 0" />

    <div class="pagination" *ngIf="totalPages > 1">
      <button class="page-btn" (click)="goToPage(1)" [disabled]="currentPage <= 1">&laquo;</button>
      <button class="page-btn" (click)="goToPage(currentPage - 1)" [disabled]="currentPage <= 1">&lsaquo;</button>
      <ng-container *ngFor="let p of pages">
        <button *ngIf="p !== -1" class="page-btn" [class.active]="p === currentPage" (click)="goToPage(p)">{{ p }}</button>
        <span class="page-ellipsis" *ngIf="p === -1">&hellip;</span>
      </ng-container>
      <button class="page-btn" (click)="goToPage(currentPage + 1)" [disabled]="currentPage >= totalPages">&rsaquo;</button>
      <button class="page-btn" (click)="goToPage(totalPages)" [disabled]="currentPage >= totalPages">&raquo;</button>
      <span class="page-info">共 {{ totalPages }} 页</span>
    </div>
  </div>
</div>
