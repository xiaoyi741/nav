<nz-modal
  [(nzVisible)]="visible"
  [nzTitle]="$t('_authLogin')"
  [nzOkLoading]="submiting"
  (nzOnCancel)="hanldeCancel()"
  (nzOnOk)="login()"
>
  <ng-container *nzModalContent>
    <p>{{ $t('_inputTokenMsg') }}</p>
    <input
      id="loginInput"
      autofocus
      nz-input
      [(ngModel)]="token"
      autofocus
      (keyup)="onKey($event)"
    />
    <p *ngIf="!isSelfDevelop" style="margin-top: 15px">
      {{ $t('_getToken') }}
    </p>
  </ng-container>
</nz-modal>
